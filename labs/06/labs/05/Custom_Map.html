<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ritvi First Web Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }

        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
    <script>
        var map = L.map("map").fitWorld();

        L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        var kyleField = [30.6084, -96.3402];
        var omBuilding = [30.6179, -96.3386];
        var academicBuilding = [30.6159, -96.3413];

        var tamuShadow = "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png";
        var maroonIcon = L.icon({
            iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png",
            shadowUrl: tamuShadow,
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        var blueIcon = L.icon({
            iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png",
            shadowUrl: tamuShadow,
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        function onLocationFound(e) {
            var radius = e.accuracy / 2;

            L.marker(e.latlng).addTo(map)
                .bindPopup("You are within " + radius.toFixed(0) + " meters from this point")
                .openPopup();

            L.circle(e.latlng, {
                radius: radius,
                color: "#2b8a3e",
                fillColor: "#40c057",
                fillOpacity: 0.2
            }).addTo(map);
        }

        function onLocationError() {
            map.setView(kyleField, 15);
        }

        map.on("locationfound", onLocationFound);
        map.on("locationerror", onLocationError);

        map.locate({ setView: true, maxZoom: 16 });

        L.circle(kyleField, {
            color: "#7a0019",
            fillColor: "#b83a4b",
            fillOpacity: 0.35,
            radius: 220
        }).addTo(map).bindPopup("Kyle Field");

        L.marker(omBuilding, { icon: maroonIcon }).addTo(map)
            .bindPopup("O&amp;M Building");

        L.marker(academicBuilding, { icon: blueIcon }).addTo(map)
            .bindPopup("Academic Building");

        var clickPopup = L.popup();

        map.on("click", function (e) {
            clickPopup
                .setLatLng(e.latlng)
                .setContent("Coordinates: " + e.latlng.lat.toFixed(6) + ", " + e.latlng.lng.toFixed(6))
                .openOn(map);
        });
    </script>
</body>
</html>
