<!DOCTYPE html>
<html>
<head>
    <title>Tutorial 2: Interactive Choropleth Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.3.1/dist/leaflet.css"
      integrity="sha512-Rksm5RenBEKSKFjgI3a41vrjkw4EVPlJ3+OiI65vTjIdo9brlAcEuKOiQ5OFh7cOI1bkDwLqdLw3Zg0cRJAAQ=="
      crossorigin=""/>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f5f5f5;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 30px 20px;
        background: white;
        min-height: 100vh;
      }
      h1 {
        color: #1a1a1a;
        font-size: 28px;
        margin: 0 0 10px 0;
        font-weight: 600;
      }
      .subtitle {
        color: #666;
        font-size: 14px;
        margin-bottom: 25px;
      }
      #mapid {
        height: 600px;
        width: 100%;
        border: none;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1), 0 2px 4px rgba(0,0,0,0.06);
        overflow: hidden;
      }
      .info {
        padding: 8px 12px;
        font: 13px/1.6 'Segoe UI', sans-serif;
        background: white;
        background: rgba(255,255,255,0.95);
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        border-radius: 6px;
        border-left: 4px solid #4285f4;
      }
      .info h4 {
        margin: 0 0 8px;
        color: #1a1a1a;
        font-weight: 600;
        font-size: 14px;
      }
      .info p {
        margin: 4px 0;
        color: #444;
      }
      .legend {
        line-height: 20px;
        color: #444;
        background: rgba(255,255,255,0.95);
        padding: 10px;
        border-radius: 6px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      }
      .legend i {
        width: 18px;
        height: 18px;
        float: left;
        margin-right: 10px;
        border-radius: 2px;
      }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tutorial 2: Interactive Choropleth Map</h1>
        <p class="subtitle">Visualizing US population density by state • Hover for details, click to zoom</p>
        <div id="mapid"></div>
    </div>

    <!-- External US States GeoJSON (HTTPS) -->
    <script src="https://leafletjs.com/examples/choropleth/us-states.js"></script>

    <script src="https://unpkg.com/leaflet@1.3.1/dist/leaflet.js"
      integrity="sha512-/Nsx9X4HebavoBvEBuyp3I7od5tA0UzAxs+j83KgC8PU0kgB4XiK4Lfe4y4cgBtaRJQEIFCW+oC506aPT2L1zw=="
      crossorigin=""></script>

    <script>
      // Create map centered on US
      var map = L.map('mapid', {
        zoomControl: true,
        preferCanvas: true
      }).setView([37.8, -96], 4);

      // Add OpenStreetMap tile layer
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 19,
        crossOrigin: ''
      }).addTo(map);

      // Info control
      var info = L.control();

      info.onAdd = function (map) {
        this._div = L.DomUtil.create('div', 'info');
        this.update();
        return this._div;
      };

      info.update = function (props) {
        this._div.innerHTML = '<h4>US Population Density</h4>' + 
          (props ? '<b>' + props.name + '</b><br />Density: ' + props.density + ' people / mi<sup>2</sup>' : 'Hover over a state');
      };

      info.addTo(map);

      // Color scale function
      function getColor(d) {
        return d > 1000 ? '#800026' :
               d > 500  ? '#BD0026' :
               d > 200  ? '#E31A1C' :
               d > 100  ? '#FC4E2A' :
               d > 50   ? '#FD8D3C' :
               d > 20   ? '#FEB24C' :
               d > 10   ? '#FED976' :
                          '#FFEDA0';
      }

      // Style function for choropleth
      function style(feature) {
        return {
          weight: 2,
          opacity: 1,
          color: '#DDD',
          dashArray: '3',
          fillOpacity: 0.7,
          fillColor: getColor(feature.properties.density)
        };
      }

      // Highlight feature on mouseover
      function highlightFeature(e) {
        var layer = e.target;

        layer.setStyle({
          weight: 5,
          color: '#666',
          dashArray: '',
          fillOpacity: 0.7
        });

        if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
          layer.bringToFront();
        }

        info.update(layer.feature.properties);
      }

      // Reset highlight on mouseout
      function resetHighlight(e) {
        geojson.resetStyle(e.target);
        info.update();
      }

      // Zoom to feature on click
      function zoomToFeature(e) {
        map.fitBounds(e.target.getBounds());
      }

      // Set listeners for each feature
      function onEachFeature(feature, layer) {
        layer.on({
          mouseover: highlightFeature,
          mouseout: resetHighlight,
          click: zoomToFeature
        });
      }

      // Add GeoJSON layer
      var geojson = L.geoJSON(statesData, {
        style: style,
        onEachFeature: onEachFeature
      }).addTo(map);

      // Add legend
      var legend = L.control({position: 'bottomright'});

      legend.onAdd = function (map) {
        var div = L.DomUtil.create('div', 'info legend');
        var densities = [0, 10, 20, 50, 100, 200, 500, 1000];
        var labels = [];

        for (var i = 0; i < densities.length; i++) {
          div.innerHTML +=
            '<i style="background:' + getColor(densities[i] + 1) + '"></i> ' +
            densities[i] + (densities[i + 1] ? '&ndash;' + densities[i + 1] + '<br>' : '+');
        }
        return div;
      };

      legend.addTo(map);
    </script>
</body>
</html>
