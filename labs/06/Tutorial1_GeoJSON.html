<!DOCTYPE html>
<html>
<head>
    <title>Tutorial 1: Using GeoJSON with Leaflet</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.3.1/dist/leaflet.css"
      integrity="sha512-Rksm5RenBEKSKFjgI3a41vrjkw4EVPlJ3+OiI65vTjIdo9brlAcEuKOiQ5OFh7cOI1bkDwLqdLw3Zg0cRJAAQ=="
      crossorigin=""/>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f5f5f5;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 30px 20px;
        background: white;
        min-height: 100vh;
      }
      h1 {
        color: #1a1a1a;
        font-size: 28px;
        margin: 0 0 10px 0;
        font-weight: 600;
      }
      .subtitle {
        color: #666;
        font-size: 14px;
        margin-bottom: 25px;
      }
      #mapid {
        height: 550px;
        width: 100%;
        border: none;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1), 0 2px 4px rgba(0,0,0,0.06);
        overflow: hidden;
      }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tutorial 1: Using GeoJSON with Leaflet</h1>
        <p class="subtitle">Explore different GeoJSON feature types: points, lines, and polygons</p>
        <div id="mapid"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.3.1/dist/leaflet.js"
      integrity="sha512-/Nsx9X4HebavoBvEBuyp3I7od5tA0UzAxs+j83KgC8PU0kgB4XiK4Lfe4y4cgBtaRJQEIFCW+oC506aPT2L1zw=="
      crossorigin=""></script>

    <script>
      // Create map
      var map = L.map('mapid', {
        zoomControl: true,
        preferCanvas: true
      }).setView([39.74739, -106], 4);

      // Add OpenStreetMap tile layer with fallback
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 19,
        crossOrigin: ''
      }).addTo(map);

      // Example GeoJSON Point Feature
      var myPoint = {
        "type": "Feature",
        "properties": {
          "name": "Coors Field",
          "amenity": "Baseball Stadium",
          "popupContent": "This is where the Rockies play!"
        },
        "geometry": {
          "type": "Point",
          "coordinates": [-104.99404, 39.75621]
        }
      };

      // Example GeoJSON Lines
      var myLines = [{
        "type": "LineString",
        "coordinates": [[-100, 40], [-105, 45], [-110, 55]]
      }, {
        "type": "LineString",
        "coordinates": [[-105, 40], [-110, 45], [-115, 55]]
      }];

      // Example GeoJSON Polygons
      var myPolys = [{
        "type": "Feature",
        "properties": {"party": "Republican"},
        "geometry": {
          "type": "Polygon",
          "coordinates": [[
            [-104.05, 48.99],
            [-97.22, 48.98],
            [-96.58, 45.94],
            [-104.03, 45.94],
            [-104.05, 48.99]
          ]]
        }
      }, {
        "type": "Feature",
        "properties": {"party": "Democrat"},
        "geometry": {
          "type": "Polygon",
          "coordinates": [[
            [-109.05, 41.00],
            [-102.06, 40.99],
            [-102.03, 36.99],
            [-109.04, 36.99],
            [-109.05, 41.00]
          ]]
        }
      }];

      // Add Point to map
      L.geoJSON(myPoint).addTo(map);

      // Add Lines to map
      var myStyle = {
        "color": "#ff7800",
        "weight": 5,
        "opacity": 0.65
      };
      L.geoJSON(myLines, {
        style: myStyle
      }).addTo(map);

      // Add Polygons with styling based on properties
      L.geoJSON(myPolys, {
        style: function(feature) {
          switch (feature.properties.party) {
            case 'Republican': return {color: "#ff0000", weight: 3, fillOpacity: 0.7};
            case 'Democrat':   return {color: "#0000ff", weight: 3, fillOpacity: 0.7};
          }
        }
      }).addTo(map);

      // Popup interactivity
      function onEachFeature(feature, layer) {
        var popupContent = "<p>" + feature.properties.popupContent + "</p>";
        layer.bindPopup(popupContent);
      }

      L.geoJSON(myPoint, {
        onEachFeature: onEachFeature
      }).addTo(map);
    </script>
    </div>
</body>
</html>
